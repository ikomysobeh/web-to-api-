server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Extension files (installer scripts, .crx, update.xml).
    # Serve the REAL file or return 404 — never fall back to index.html,
    # otherwise a missing file silently downloads the web page instead.
    # .xml keeps its type from mime.types; .crx/.ps1/.command -> octet-stream.
    # Content-Disposition forces the installer scripts to download.
    location /ext/ {
        try_files $uri =404;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
    }

    # This makes React Router work — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
