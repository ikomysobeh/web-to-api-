services:
  # PostgreSQL Database (pgvector image — includes the vector extension)
  db:
    image: pgvector/pgvector:pg16
    container_name: webai-postgres
    environment:
      POSTGRES_DB: webai_bridge
      POSTGRES_USER: ${DB_USER:-webai_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_please}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Published on host port 5433 (not 5432) to avoid clashing with a native
    # PostgreSQL already running on the host. Bound to localhost only — not
    # exposed to the internet. Containers reach the DB internally via the "db"
    # hostname on port 5432 regardless of this mapping. A local DB GUI connects
    # to localhost:5433. Remove this block entirely if you don't need GUI access.
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-webai_user} -d webai_bridge"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - webai_network

  # NATS Message Broker (JetStream enabled)
  nats:
    image: nats:2.10-alpine
    container_name: webai-nats
    ports:
      - "4223:4222"    # client connections (4223 on host to avoid clash with pizza-nats)
      - "8223:8222"    # HTTP monitoring
    # Auth token comes from .env (NATS_TOKEN). Must match the bridge and pizzasys.
    # Defaults to "localdev" for local dev — set a strong NATS_TOKEN in production.
    command: ["--jetstream", "--store_dir=/data", "--http_port", "8222", "--auth", "${NATS_TOKEN:-localdev}"]
    volumes:
      - nats_data:/data   # persist JetStream messages across restarts
    restart: unless-stopped
    networks:
      - webai_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # WebAI-to-API
  webai:
    build:
      context: ./WebAI-to-API
      dockerfile: Dockerfile
    container_name: webai-api
    environment:
      WEBAI_INTERNAL_KEY: ${WEBAI_INTERNAL_KEY}
    # Internal-only service — the bridge reaches it via the private network as
    # http://webai:6969. Bound to localhost so it is NOT exposed to the internet.
    ports:
      - "127.0.0.1:6969:6969"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6969/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # WebAI-to-API uses its own SQLite store — no dependency on Postgres.
    restart: unless-stopped
    networks:
      - webai_network

  # WebAI Bridge
  bridge:
    build:
      context: ./webai-bridge
      dockerfile: Dockerfile
    container_name: webai-bridge
    extra_hosts:
      - "host-gateway:host-gateway"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-webai_user}:${DB_PASSWORD:-change_me_please}@db:5432/webai_bridge
      WEBAI_URL: http://webai:6969
      WEBAI_INTERNAL_KEY: ${WEBAI_INTERNAL_KEY}
      SECRET_KEY: ${SECRET_KEY}
      COOKIE_ENCRYPTION_KEY: ${COOKIE_ENCRYPTION_KEY}
      NATS_URL: nats://nats:4222
      NATS_TOKEN: ${NATS_TOKEN:-}
      NATS_USER: ${NATS_USER:-}
      NATS_PASS: ${NATS_PASS:-}
      NATS_AUTH_STREAM: ${NATS_AUTH_STREAM:-AUTH_EVENTS}
      NATS_AUTH_DURABLE: ${NATS_AUTH_DURABLE:-WEBAI_BRIDGE_AUTH_CONSUMER}
      DEV_MODE: ${DEV_MODE:-0}
      LARAVEL_AUTH_URL: ${LARAVEL_AUTH_URL:-}
      AUTH_SERVER_BASE_URL: ${AUTH_SERVER_BASE_URL:-http://host-gateway:8001}
      AUTH_SERVER_VERIFY_PATH: /api/v1/auth/token-verify
      AUTH_SERVER_SERVICE_NAME: webai-bridge
      AUTH_SERVER_CALL_TOKEN: ${AUTH_SERVER_CALL_TOKEN:-}
      # Extra browser origins allowed by CORS (comma-separated). Localhost is
      # always allowed; add the public frontend URL here in production.
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Ollama runs on the VPS/host; containers reach it via host-gateway.
      OLLAMA_URL: ${OLLAMA_URL:-http://host-gateway:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-nomic-embed-text}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      webai:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - webai_network

  # Frontend (web2api-ui)
  frontend:
    build:
      context: ./web2api-ui
      dockerfile: Dockerfile
      # Build-time args baked into the JS bundle. Set the public URLs in .env and
      # rebuild (docker compose up -d --build frontend) for changes to take effect.
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_AUTH_URL: ${VITE_AUTH_URL:-http://localhost:8001}
    ports:
      - "3000:3000"
    depends_on:
      - bridge
    restart: unless-stopped
    networks:
      - webai_network

volumes:
  postgres_data:
  nats_data:

networks:
  webai_network:
    driver: bridge
